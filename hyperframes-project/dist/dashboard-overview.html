<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Overview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      overflow: hidden;
    }

    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    .viewport {
      width: 375px;
      height: 812px;
      position: relative;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      border-radius: 40px;
      border: 12px solid #000;
    }

    .scenes {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    .scene {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .scene.active {
      opacity: 1;
      z-index: 10;
    }

    .scene-content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      overflow: hidden;
    }

    .scene-content img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scene-title {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 12px;
      color: #999;
      z-index: 20;
      background: rgba(0,0,0,0.3);
      padding: 4px 8px;
      border-radius: 4px;
    }

    .placeholder {
      color: #ccc;
      font-size: 14px;
      text-align: center;
    }

    .overlays {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 30;
    }

    .overlay {
      position: absolute;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 4px;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover { background: #0051D5; }

    .progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: #007AFF;
      width: 0%;
      z-index: 35;
    }

    .info {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 12px;
      color: #999;
      background: rgba(0,0,0,0.3);
      padding: 4px 8px;
      border-radius: 4px;
      z-index: 25;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="viewport">
      <div class="scenes" id="scenes">
        
    <div class="scene" data-id="scene_1_main_dashboard" data-start="0" data-duration="6000">
      <div class="scene-title">Main Dashboard</div>
      <div class="scene-content">
        <img src="assets/mobile-screens/08-dashboard-main.png" alt="Main Dashboard" />
      </div>
      
    </div>
    
    <div class="scene" data-id="scene_2_dashboard_cards" data-start="6000" data-duration="7000">
      <div class="scene-title">Dashboard Cards</div>
      <div class="scene-content">
        <img src="assets/mobile-screens/09-dashboard-cards.png" alt="Dashboard Cards" />
      </div>
      
      <div class="interactions">
        
        <div class="interaction" data-type="scroll" data-timestamp="1000">
          scroll: down
        </div>
        
      </div>
      
    </div>
    
    <div class="scene" data-id="scene_3_dashboard_bottom" data-start="13000" data-duration="7000">
      <div class="scene-title">Dashboard Bottom Section</div>
      <div class="scene-content">
        <img src="assets/mobile-screens/10-dashboard-bottom.png" alt="Dashboard Bottom Section" />
      </div>
      
      <div class="interactions">
        
        <div class="interaction" data-type="scroll" data-timestamp="1000">
          scroll: down
        </div>
        
      </div>
      
    </div>
    
      </div>
      <div class="overlays">
        
    <div class="overlay" id="title_overlay" data-type="text">
      Dashboard Overview
    </div>
  
      </div>
      <div class="info" id="info">0:00 / 20.0s</div>
      <div class="progress" id="progress"></div>
      <div class="controls">
        <button id="playBtn">▶ Play</button>
        <button id="resetBtn">⟲ Reset</button>
      </div>
    </div>
  </div>

  <script>
    const manifest = {"version":"1.0.0","id":"dashboard_overview","title":"Dashboard Overview","description":"Interactive demonstration of the main dashboard and its key features","duration":20000,"viewport":{"width":375,"height":812},"scenes":[{"id":"scene_1_main_dashboard","name":"Main Dashboard","startTime":0,"duration":6000,"content":{"type":"screenshot","assetPath":"assets/mobile-screens/08-dashboard-main.png","description":"Main dashboard view with header and cards"},"interactions":[]},{"id":"scene_2_dashboard_cards","name":"Dashboard Cards","startTime":6000,"duration":7000,"content":{"type":"screenshot","assetPath":"assets/mobile-screens/09-dashboard-cards.png","description":"Dashboard with card details and statistics visible"},"interactions":[{"id":"scroll_to_cards","type":"scroll","direction":"down","distance":150,"timestamp":1000,"duration":1500}]},{"id":"scene_3_dashboard_bottom","name":"Dashboard Bottom Section","startTime":13000,"duration":7000,"content":{"type":"screenshot","assetPath":"assets/mobile-screens/10-dashboard-bottom.png","description":"Dashboard bottom section with additional options"},"interactions":[{"id":"scroll_bottom","type":"scroll","direction":"down","distance":150,"timestamp":1000,"duration":1500}]}],"transitions":[{"from":"scene_1_main_dashboard","to":"scene_2_dashboard_cards","type":"fade","duration":400},{"from":"scene_2_dashboard_cards","to":"scene_3_dashboard_bottom","type":"fade","duration":400}],"overlays":[{"id":"title_overlay","type":"text","text":"Dashboard Overview","position":{"x":10,"y":10},"styling":{"fontSize":"18px","fontWeight":"bold","color":"#ffffff","backgroundColor":"rgba(0,0,0,0.5)","padding":"10px"},"duration":[0,20000]}],"metadata":{"createdAt":"2026-04-18","updatedAt":"2026-04-18","author":"Godol","tags":["demo","dashboard","mobile","navigation","overview"]}};
    const scenesEl = document.getElementById('scenes');
    const progressEl = document.getElementById('progress');
    const infoEl = document.getElementById('info');
    const playBtn = document.getElementById('playBtn');
    const resetBtn = document.getElementById('resetBtn');

    let currentTime = 0;
    let isPlaying = false;
    let animationFrame = null;
    let startTime = 0;

    function updateScene() {
      const scenes = document.querySelectorAll('.scene');
      scenes.forEach(scene => {
        const sceneStart = parseInt(scene.dataset.start);
        const sceneDuration = parseInt(scene.dataset.duration);
        const sceneEnd = sceneStart + sceneDuration;

        if (currentTime >= sceneStart && currentTime < sceneEnd) {
          scene.classList.add('active');
        } else {
          scene.classList.remove('active');
        }
      });

      const progress = (currentTime / manifest.duration) * 100;
      progressEl.style.width = progress + '%';

      const minutes = Math.floor(currentTime / 60000);
      const seconds = ((currentTime % 60000) / 1000).toFixed(1);
      const totalSeconds = (manifest.duration / 1000).toFixed(1);
      infoEl.textContent = `${minutes}:${String(Math.floor(seconds)).padStart(2, '0')} / ${totalSeconds}s`;
    }

    function animate(timestamp) {
      if (!startTime) startTime = timestamp;
      currentTime = timestamp - startTime;

      if (currentTime >= manifest.duration) {
        currentTime = manifest.duration;
        isPlaying = false;
        playBtn.textContent = '▶ Play';
      }

      updateScene();

      if (isPlaying) {
        animationFrame = requestAnimationFrame(animate);
      }
    }

    playBtn.addEventListener('click', () => {
      if (isPlaying) {
        isPlaying = false;
        playBtn.textContent = '▶ Play';
        cancelAnimationFrame(animationFrame);
      } else {
        isPlaying = true;
        playBtn.textContent = '⏸ Pause';
        startTime = performance.now() - currentTime;
        animationFrame = requestAnimationFrame(animate);
      }
    });

    resetBtn.addEventListener('click', () => {
      isPlaying = false;
      currentTime = 0;
      startTime = 0;
      playBtn.textContent = '▶ Play';
      cancelAnimationFrame(animationFrame);
      updateScene();
    });

    updateScene();
  </script>
</body>
</html>
