<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking an Appointment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      overflow: hidden;
    }

    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }

    .viewport {
      width: 375px;
      height: 812px;
      position: relative;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      border-radius: 40px;
      border: 12px solid #000;
    }

    .scenes {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    .scene {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .scene.active {
      opacity: 1;
      z-index: 10;
    }

    .scene-content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      overflow: hidden;
    }

    .scene-content img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scene-title {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 12px;
      color: #999;
      z-index: 20;
      background: rgba(0,0,0,0.3);
      padding: 4px 8px;
      border-radius: 4px;
    }

    .placeholder {
      color: #ccc;
      font-size: 14px;
      text-align: center;
    }

    .overlays {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 30;
    }

    .overlay {
      position: absolute;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 4px;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover { background: #0051D5; }

    .progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: #007AFF;
      width: 0%;
      z-index: 35;
    }

    .info {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 12px;
      color: #999;
      background: rgba(0,0,0,0.3);
      padding: 4px 8px;
      border-radius: 4px;
      z-index: 25;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="viewport">
      <div class="scenes" id="scenes">
        
    <div class="scene" data-id="scene_1_appointments_list" data-start="0" data-duration="5000">
      <div class="scene-title">Appointments Page</div>
      <div class="scene-content">
        <img src="assets/mobile-screens/12-appointments-list.png" alt="Appointments Page" />
      </div>
      
    </div>
    
    <div class="scene" data-id="scene_2_booking_form" data-start="5000" data-duration="8000">
      <div class="scene-title">Booking Form</div>
      <div class="scene-content">
        <img src="assets/mobile-screens/13-appointment-form.png" alt="Booking Form" />
      </div>
      
      <div class="interactions">
        
        <div class="interaction" data-type="button_click" data-timestamp="500">
          button_click: book_button
        </div>
        
      </div>
      
    </div>
    
    <div class="scene" data-id="scene_3_form_fields" data-start="13000" data-duration="8000">
      <div class="scene-title">Booking Form Details</div>
      <div class="scene-content">
        <img src="assets/mobile-screens/14-appointment-form-fields.png" alt="Booking Form Details" />
      </div>
      
      <div class="interactions">
        
        <div class="interaction" data-type="scroll" data-timestamp="1000">
          scroll: down
        </div>
        
        <div class="interaction" data-type="form_interaction" data-timestamp="3000">
          form_interaction: appointment_form
        </div>
        
      </div>
      
    </div>
    
    <div class="scene" data-id="scene_4_confirmation" data-start="21000" data-duration="4000">
      <div class="scene-title">Confirmation</div>
      <div class="scene-content">
        <img src="assets/mobile-screens/14-appointment-form-fields.png" alt="Confirmation" />
      </div>
      
      <div class="interactions">
        
        <div class="interaction" data-type="button_click" data-timestamp="1000">
          button_click: confirm_button
        </div>
        
      </div>
      
    </div>
    
      </div>
      <div class="overlays">
        
    <div class="overlay" id="title_overlay" data-type="text">
      Booking an Appointment
    </div>
  
    <div class="overlay" id="step_counter" data-type="text">
      Step 1/4: View Appointments
    </div>
  
      </div>
      <div class="info" id="info">0:00 / 25.0s</div>
      <div class="progress" id="progress"></div>
      <div class="controls">
        <button id="playBtn">▶ Play</button>
        <button id="resetBtn">⟲ Reset</button>
      </div>
    </div>
  </div>

  <script>
    const manifest = {"version":"1.0.0","id":"appointment_booking","title":"Booking an Appointment","description":"Step-by-step guide to booking a medical appointment through the app","duration":25000,"viewport":{"width":375,"height":812},"scenes":[{"id":"scene_1_appointments_list","name":"Appointments Page","startTime":0,"duration":5000,"content":{"type":"screenshot","assetPath":"assets/mobile-screens/12-appointments-list.png","description":"Appointments list or main appointments page"},"interactions":[]},{"id":"scene_2_booking_form","name":"Booking Form","startTime":5000,"duration":8000,"content":{"type":"screenshot","assetPath":"assets/mobile-screens/13-appointment-form.png","description":"Appointment booking form with initial fields"},"interactions":[{"id":"open_form","type":"button_click","target":"book_button","timestamp":500,"duration":500}]},{"id":"scene_3_form_fields","name":"Booking Form Details","startTime":13000,"duration":8000,"content":{"type":"screenshot","assetPath":"assets/mobile-screens/14-appointment-form-fields.png","description":"Booking form with all fields visible"},"interactions":[{"id":"scroll_form","type":"scroll","direction":"down","distance":150,"timestamp":1000,"duration":1500},{"id":"fill_form","type":"form_interaction","target":"appointment_form","timestamp":3000,"duration":2000}]},{"id":"scene_4_confirmation","name":"Confirmation","startTime":21000,"duration":4000,"content":{"type":"screenshot","assetPath":"assets/mobile-screens/14-appointment-form-fields.png","description":"Ready to confirm appointment booking"},"interactions":[{"id":"submit_form","type":"button_click","target":"confirm_button","timestamp":1000,"duration":500}]}],"transitions":[{"from":"scene_1_appointments_list","to":"scene_2_booking_form","type":"fade","duration":400},{"from":"scene_2_booking_form","to":"scene_3_form_fields","type":"fade","duration":400},{"from":"scene_3_form_fields","to":"scene_4_confirmation","type":"fade","duration":400}],"overlays":[{"id":"title_overlay","type":"text","text":"Booking an Appointment","position":{"x":10,"y":10},"styling":{"fontSize":"18px","fontWeight":"bold","color":"#ffffff","backgroundColor":"rgba(0,0,0,0.5)","padding":"10px"},"duration":[0,25000]},{"id":"step_counter","type":"text","text":"Step 1/4: View Appointments","position":{"x":10,"y":50},"styling":{"fontSize":"12px","color":"#cccccc","backgroundColor":"rgba(0,0,0,0.3)"},"duration":[0,5000]}],"metadata":{"createdAt":"2026-04-18","updatedAt":"2026-04-18","author":"Godol","tags":["demo","appointments","booking","mobile","scheduling","tutorial"]}};
    const scenesEl = document.getElementById('scenes');
    const progressEl = document.getElementById('progress');
    const infoEl = document.getElementById('info');
    const playBtn = document.getElementById('playBtn');
    const resetBtn = document.getElementById('resetBtn');

    let currentTime = 0;
    let isPlaying = false;
    let animationFrame = null;
    let startTime = 0;

    function updateScene() {
      const scenes = document.querySelectorAll('.scene');
      scenes.forEach(scene => {
        const sceneStart = parseInt(scene.dataset.start);
        const sceneDuration = parseInt(scene.dataset.duration);
        const sceneEnd = sceneStart + sceneDuration;

        if (currentTime >= sceneStart && currentTime < sceneEnd) {
          scene.classList.add('active');
        } else {
          scene.classList.remove('active');
        }
      });

      const progress = (currentTime / manifest.duration) * 100;
      progressEl.style.width = progress + '%';

      const minutes = Math.floor(currentTime / 60000);
      const seconds = ((currentTime % 60000) / 1000).toFixed(1);
      const totalSeconds = (manifest.duration / 1000).toFixed(1);
      infoEl.textContent = `${minutes}:${String(Math.floor(seconds)).padStart(2, '0')} / ${totalSeconds}s`;
    }

    function animate(timestamp) {
      if (!startTime) startTime = timestamp;
      currentTime = timestamp - startTime;

      if (currentTime >= manifest.duration) {
        currentTime = manifest.duration;
        isPlaying = false;
        playBtn.textContent = '▶ Play';
      }

      updateScene();

      if (isPlaying) {
        animationFrame = requestAnimationFrame(animate);
      }
    }

    playBtn.addEventListener('click', () => {
      if (isPlaying) {
        isPlaying = false;
        playBtn.textContent = '▶ Play';
        cancelAnimationFrame(animationFrame);
      } else {
        isPlaying = true;
        playBtn.textContent = '⏸ Pause';
        startTime = performance.now() - currentTime;
        animationFrame = requestAnimationFrame(animate);
      }
    });

    resetBtn.addEventListener('click', () => {
      isPlaying = false;
      currentTime = 0;
      startTime = 0;
      playBtn.textContent = '▶ Play';
      cancelAnimationFrame(animationFrame);
      updateScene();
    });

    updateScene();
  </script>
</body>
</html>
