<!DOCTYPE html>

<title>BetterHealth Africa</title>
<script>
  var l = window.location;
  l.replace(l.protocol+"//"+l.hostname+(l.port ? ":"+l.port : "")+
  "/?/"+l.pathname.slice(1).replace(/&/g,"%26")+
  (l.search ? "&"+l.search.slice(1).replace(/&/g,"%26") : "")+l.hash);
</script>
