    <script>
      // Handle SPA redirect from 404.html
      (function(l){
        if (l.search.length > 1) {
          var path = l.search.slice(1).split("&").map(function(s) {
            return s.replace(/%26/g, "&")
          }).join("?");
          if (path && !path.startsWith("=")) {
            window.history.replaceState(null, null, "/" + path + l.hash);
          }
        }
      }(window.location))
    </script>
